name: Auto-Fix

on:
  issues:
    types: [labeled]

jobs:
  fix:
    name: Attempt automatic fix
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Attempt build to reproduce
        id: build
        continue-on-error: true
        run: |
          chmod +x scripts/download-bootstrap.sh 2>/dev/null || true
          ./scripts/download-bootstrap.sh 2>/dev/null || true
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Report build result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildLog = fs.existsSync('build.log') ? fs.readFileSync('build.log', 'utf8').slice(-2000) : 'No build log';

            const body = [
              '## 🤖 Auto-Fix Build Attempt',
              '',
              '### Build Result',
              '${{ steps.build.outcome == 'success' && '✅ Build passed' || '❌ Build failed' }}',
              '',
              '### Build Log (last 2000 chars)',
              '```',
              buildLog,
              '```',
              '',
              '### Next Steps',
              '- If build failed, check the error above',
              '- Consider running a local build with:',
              '  ```bash',
              '  cd ~/onezion-agent',
              '  ./gradlew assembleDebug',
              '  ```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

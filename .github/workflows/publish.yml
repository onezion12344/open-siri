name: Publish Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Download Termux bootstrap
        run: |
          chmod +x scripts/download-bootstrap.sh
          ./scripts/download-bootstrap.sh

      - name: Build bootstrap APK
        run: ./gradlew assembleBootstrapDebug --stacktrace

      - name: Build complete APK
        run: |
          chmod +x scripts/prebuild-complete.sh 2>/dev/null || true
          ./scripts/prebuild-complete.sh 2>/dev/null || true
          ./gradlew assembleCompleteDebug --stacktrace 2>/dev/null || echo "Skipped"
        continue-on-error: true

      - name: Get APK sizes
        id: sizes
        run: |
          B_APK=$(ls app/build/outputs/apk/bootstrap/debug/*.apk | head -1)
          B_SIZE=$(stat -c%s "$B_APK")
          B_MB=$(echo "scale=1; $B_SIZE / 1048576" | bc)
          echo "bootstrap_size=$B_MB MB" >> $GITHUB_OUTPUT
          echo "bootstrap_bytes=$B_SIZE" >> $GITHUB_OUTPUT

          C_APK=$(ls app/build/outputs/apk/complete/debug/*.apk 2>/dev/null | head -1 || echo "")
          if [ -n "$C_APK" ]; then
            C_SIZE=$(stat -c%s "$C_APK")
            C_MB=$(echo "scale=1; $C_SIZE / 1048576" | bc)
            echo "complete_size=$C_MB MB" >> $GITHUB_OUTPUT
            echo "complete_bytes=$C_SIZE" >> $GITHUB_OUTPUT
          else
            echo "complete_size=N/A" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          VERSION="${{ github.ref_name }}"

          echo "# Open Siri $VERSION" > release-notes.md
          echo "" >> release-notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" >> release-notes.md
          else
            echo "## Changes" >> release-notes.md
          fi
          echo "" >> release-notes.md

          # Features
          echo "### ✨ Features" >> release-notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges --grep="^feat" >> release-notes.md 2>/dev/null || echo "- Initial release" >> release-notes.md
          echo "" >> release-notes.md

          # Fixes
          echo "### 🐛 Fixes" >> release-notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges --grep="^fix" >> release-notes.md 2>/dev/null || echo "- N/A" >> release-notes.md
          echo "" >> release-notes.md

          # Chores
          echo "### 🔧 Maintenance" >> release-notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges --grep="^chore" >> release-notes.md 2>/dev/null || echo "- N/A" >> release-notes.md
          echo "" >> release-notes.md

          echo "## 📦 APKs" >> release-notes.md
          echo "- **Bootstrap Edition:** ${{ steps.sizes.outputs.bootstrap_size }}" >> release-notes.md
          echo "- **Complete Edition:** ${{ steps.sizes.outputs.complete_size }}" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Open Siri ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            app/build/outputs/apk/bootstrap/debug/*.apk
            app/build/outputs/apk/complete/debug/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

      - name: Notify Telegram
        run: |
          VERSION="${{ github.ref_name }}"
          B_SIZE="${{ steps.sizes.outputs.bootstrap_size }}"
          C_SIZE="${{ steps.sizes.outputs.complete_size }}"

          MESSAGE="🚀 <b>Open Siri ${VERSION}</b> released!

          📦 <b>APK Downloads:</b>
          • Bootstrap Edition: ${B_SIZE}
          • Complete Edition: ${C_SIZE}

          🔗 <a href='https://github.com/${{ github.repository }}/releases/tag/${VERSION}'>Download on GitHub</a>"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
